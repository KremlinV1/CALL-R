services:
  - type: web
    name: call-r-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run db:push && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: VOGENT_API_KEY
        sync: false
      - key: VOGENT_BASE_AGENT_ID
        sync: false
      - key: VOGENT_PHONE_NUMBER_ID
        sync: false
      - key: VOGENT_PHONE_NUMBER
        sync: false
      - key: VOGENT_WEBHOOK_URL
        sync: false
    healthCheckPath: /health

  - type: worker
    name: bank-ivr-agent
    runtime: docker
    region: oregon
    rootDir: agents
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: BACKEND_API_TOKEN
        sync: false
